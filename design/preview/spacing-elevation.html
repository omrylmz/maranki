<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);font-family:var(--font-sans);color:var(--ink);padding:26px 24px 30px;}
  .row{display:flex;gap:22px;}
  .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:11px;}
  .box{width:100%;height:54px;background:var(--card);border-radius:var(--r-md);}
  .n{font-size:11px;font-weight:700;}
  .cap{font-size:11px;color:var(--ink-3);margin-bottom:16px;font-weight:600;}
</style></head><body>
  <div class="cap">Elevation — warm, soft, low-contrast</div>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="n">xs</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="n">sm</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="n">md</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="n">lg</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-card)"></div><div class="n">card</div></div>
  </div>
</body></html>
