<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);font-family:var(--font-sans);color:var(--ink);padding:22px 24px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:var(--r-pill);font-size:13px;font-weight:600;}
  .dot{width:9px;height:9px;border-radius:50%;}
  .cap{font-size:11px;color:var(--ink-3);margin-bottom:12px;font-weight:600;}
</style></head><body>
  <div class="cap">Card lifecycle states</div>
  <div class="row">
    <span class="pill" style="background:var(--state-new-tint);color:var(--state-new)"><span class="dot" style="background:var(--state-new)"></span>New</span>
    <span class="pill" style="background:var(--state-learning-tint);color:var(--state-learning)"><span class="dot" style="background:var(--state-learning)"></span>Learning</span>
    <span class="pill" style="background:var(--state-review-tint);color:var(--state-review)"><span class="dot" style="background:var(--state-review)"></span>Review</span>
    <span class="pill" style="background:var(--state-mastered-tint);color:var(--state-mastered)"><span class="dot" style="background:var(--state-mastered)"></span>Mastered</span>
    <span class="pill" style="background:var(--state-due-tint);color:var(--state-due)"><span class="dot" style="background:var(--state-due)"></span>Due now</span>
  </div>
</body></html>
