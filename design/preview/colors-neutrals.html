<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);font-family:var(--font-sans);color:var(--ink);padding:22px 24px;}
  .row{display:flex;gap:14px;}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px;}
  .chip{height:64px;border-radius:var(--r-md);border:1px solid var(--hairline);box-shadow:var(--shadow-xs);}
  .n{font-size:12px;font-weight:700;color:var(--ink);}
  .h{font-size:11px;font-family:var(--font-mono);color:var(--ink-3);}
</style></head><body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--paper)"></div><div class="n">Paper</div><div class="h">#F4F0E7</div></div>
    <div class="sw"><div class="chip" style="background:var(--paper-sunk)"></div><div class="n">Paper sunk</div><div class="h">#ECE6D9</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface)"></div><div class="n">Surface</div><div class="h">#FBF8F2</div></div>
    <div class="sw"><div class="chip" style="background:var(--card)"></div><div class="n">Card</div><div class="h">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="n">Ink</div><div class="h">#211E1A</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-2)"></div><div class="n">Ink 2</div><div class="h">#5B554B</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-3)"></div><div class="n">Ink 3</div><div class="h">#8B8478</div></div>
  </div>
</body></html>
