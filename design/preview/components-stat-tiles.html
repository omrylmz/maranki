<!-- @dsCard group="Components" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<script src="../ion-inline.js"></script>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);font-family:var(--font-sans);color:var(--ink);padding:22px 24px;display:flex;gap:14px;}
  .tile{flex:1;background:var(--card);border:1px solid var(--hairline);border-radius:var(--r-md);box-shadow:var(--shadow-sm);padding:16px 18px;display:flex;flex-direction:column;gap:6px;}
  .top{display:flex;align-items:center;gap:7px;}
  .top ion-icon{font-size:18px;}
  .top span{font-size:12px;font-weight:600;color:var(--ink-2);}
  .num{font-family:var(--font-sans);font-weight:800;font-size:34px;letter-spacing:-.02em;font-feature-settings:'tnum' 1;line-height:1;}
  .sub{font-size:12px;color:var(--ink-3);}
</style></head><body>
  <div class="tile">
    <div class="top"><ion-icon name="flame" style="color:var(--amber)"></ion-icon><span>Streak</span></div>
    <div class="num" style="color:var(--amber)">12<span style="font-size:16px;font-weight:700;"> days</span></div>
    <div class="sub">2 freezes left</div>
  </div>
  <div class="tile">
    <div class="top"><ion-icon name="checkmark-circle" style="color:var(--pine)"></ion-icon><span>Mastered</span></div>
    <div class="num" style="color:var(--ink)">68<span style="font-size:16px;font-weight:700;">%</span></div>
    <div class="sub">842 of 1,240 cards</div>
  </div>
  <div class="tile">
    <div class="top"><ion-icon name="time-outline" style="color:var(--state-due)"></ion-icon><span>Due today</span></div>
    <div class="num" style="color:var(--ink)">18</div>
    <div class="sub">~6 min · 5 new</div>
  </div>
</body></html>
