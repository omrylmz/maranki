<!DOCTYPE html><html><head><meta charset="utf-8">
<script src="../ion-inline.js"></script>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);font-family:var(--font-sans);color:var(--ink);padding:22px 24px;}
  .cap{font-size:11px;color:var(--ink-3);margin-bottom:14px;font-weight:600;}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:16px 10px;}
  .ic{display:flex;flex-direction:column;align-items:center;gap:7px;}
  .ic ion-icon{font-size:24px;color:var(--ink);}
  .ic span{font-family:var(--font-mono);font-size:9.5px;color:var(--ink-3);text-align:center;}
</style></head><body>
  <div class="cap">Ionicons — the product's icon vocabulary</div>
  <div class="grid">
    <div class="ic"><ion-icon name="home"></ion-icon><span>home</span></div>
    <div class="ic"><ion-icon name="book"></ion-icon><span>book</span></div>
    <div class="ic"><ion-icon name="search"></ion-icon><span>search</span></div>
    <div class="ic"><ion-icon name="bar-chart"></ion-icon><span>bar-chart</span></div>
    <div class="ic"><ion-icon name="flame" style="color:var(--amber)"></ion-icon><span>flame</span></div>
    <div class="ic"><ion-icon name="trophy" style="color:var(--amber)"></ion-icon><span>trophy</span></div>
    <div class="ic"><ion-icon name="flash"></ion-icon><span>flash</span></div>
    <div class="ic"><ion-icon name="albums"></ion-icon><span>albums</span></div>
    <div class="ic"><ion-icon name="checkmark-circle" style="color:var(--pine)"></ion-icon><span>check-circle</span></div>
    <div class="ic"><ion-icon name="school"></ion-icon><span>school</span></div>
    <div class="ic"><ion-icon name="heart" style="color:var(--danger)"></ion-icon><span>heart</span></div>
    <div class="ic"><ion-icon name="snow" style="color:var(--info)"></ion-icon><span>snow</span></div>
    <div class="ic"><ion-icon name="volume-high"></ion-icon><span>volume</span></div>
    <div class="ic"><ion-icon name="timer"></ion-icon><span>timer</span></div>
    <div class="ic"><ion-icon name="cloud-download"></ion-icon><span>import</span></div>
    <div class="ic"><ion-icon name="settings"></ion-icon><span>settings</span></div>
  </div>
</body></html>
