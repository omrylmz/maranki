<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);font-family:var(--font-sans);color:var(--ink);padding:22px 24px;}
  .grp{display:flex;gap:24px;}
  .col{flex:1;}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px;}
  .row{display:flex;gap:10px;}
  .sw{flex:1;display:flex;flex-direction:column;gap:7px;}
  .chip{height:58px;border-radius:var(--r-md);box-shadow:var(--shadow-xs);}
  .n{font-size:11.5px;font-weight:700;}
  .h{font-size:10.5px;font-family:var(--font-mono);color:var(--ink-3);}
</style></head><body>
  <div class="grp">
    <div class="col">
      <div class="lbl">Pine — primary</div>
      <div class="row">
        <div class="sw"><div class="chip" style="background:var(--pine)"></div><div class="n">Pine</div><div class="h">#136F63</div></div>
        <div class="sw"><div class="chip" style="background:var(--pine-deep)"></div><div class="n">Deep</div><div class="h">#0E574E</div></div>
        <div class="sw"><div class="chip" style="background:var(--pine-tint)"></div><div class="n">Tint</div><div class="h">#E2EDE9</div></div>
      </div>
    </div>
    <div class="col">
      <div class="lbl">Amber — reward</div>
      <div class="row">
        <div class="sw"><div class="chip" style="background:var(--amber)"></div><div class="n">Amber</div><div class="h">#DD8A2B</div></div>
        <div class="sw"><div class="chip" style="background:var(--honey)"></div><div class="n">Honey</div><div class="h">#F2B741</div></div>
        <div class="sw"><div class="chip" style="background:var(--amber-tint)"></div><div class="n">Tint</div><div class="h">#FAECD6</div></div>
      </div>
    </div>
  </div>
</body></html>
