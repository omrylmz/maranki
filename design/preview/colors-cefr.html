<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);font-family:var(--font-sans);color:var(--ink);padding:22px 24px;}
  .row{display:flex;gap:12px;}
  .lv{flex:1;border-radius:var(--r-md);padding:14px 0;display:flex;flex-direction:column;align-items:center;gap:5px;border:1px solid var(--hairline);}
  .badge{font-family:var(--font-sans);font-weight:800;font-size:18px;letter-spacing:-.01em;}
  .h{font-size:10px;font-family:var(--font-mono);color:var(--ink-3);}
  .cap{font-size:11px;color:var(--ink-3);margin-bottom:12px;font-weight:600;}
</style></head><body>
  <div class="cap">CEFR proficiency levels — A1 (easiest) to C2 (mastery)</div>
  <div class="row">
    <div class="lv" style="background:var(--cefr-a1-tint)"><span class="badge" style="color:var(--cefr-a1)">A1</span><span class="h">#4A9D7F</span></div>
    <div class="lv" style="background:var(--cefr-a2-tint)"><span class="badge" style="color:var(--cefr-a2)">A2</span><span class="h">#2D9AA6</span></div>
    <div class="lv" style="background:var(--cefr-b1-tint)"><span class="badge" style="color:var(--cefr-b1)">B1</span><span class="h">#2D77B0</span></div>
    <div class="lv" style="background:var(--cefr-b2-tint)"><span class="badge" style="color:var(--cefr-b2)">B2</span><span class="h">#6A6CC0</span></div>
    <div class="lv" style="background:var(--cefr-c1-tint)"><span class="badge" style="color:var(--cefr-c1)">C1</span><span class="h">#B5682A</span></div>
    <div class="lv" style="background:var(--cefr-c2-tint)"><span class="badge" style="color:var(--cefr-c2)">C2</span><span class="h">#A8432F</span></div>
  </div>
</body></html>
