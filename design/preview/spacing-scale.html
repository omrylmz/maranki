<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);font-family:var(--font-sans);color:var(--ink);padding:22px 24px;}
  .row{display:flex;align-items:flex-end;gap:18px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{background:var(--pine);border-radius:3px;width:100%;}
  .n{font-size:11px;font-weight:700;}
  .h{font-size:10px;font-family:var(--font-mono);color:var(--ink-3);}
  .cap{font-size:11px;color:var(--ink-3);margin-bottom:14px;font-weight:600;}
</style></head><body>
  <div class="cap">Spacing scale — 4px base</div>
  <div class="row">
    <div class="col" style="width:30px"><div class="bar" style="height:4px"></div><div class="n">1</div><div class="h">4</div></div>
    <div class="col" style="width:30px"><div class="bar" style="height:8px"></div><div class="n">2</div><div class="h">8</div></div>
    <div class="col" style="width:30px"><div class="bar" style="height:12px"></div><div class="n">3</div><div class="h">12</div></div>
    <div class="col" style="width:36px"><div class="bar" style="height:16px"></div><div class="n">4</div><div class="h">16</div></div>
    <div class="col" style="width:40px"><div class="bar" style="height:24px"></div><div class="n">6</div><div class="h">24</div></div>
    <div class="col" style="width:46px"><div class="bar" style="height:32px"></div><div class="n">8</div><div class="h">32</div></div>
    <div class="col" style="width:52px"><div class="bar" style="height:48px"></div><div class="n">12</div><div class="h">48</div></div>
    <div class="col" style="width:60px"><div class="bar" style="height:64px"></div><div class="n">16</div><div class="h">64</div></div>
  </div>
</body></html>
