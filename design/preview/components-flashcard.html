<!-- @dsCard group="Components" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<script src="../ion-inline.js"></script>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);font-family:var(--font-sans);color:var(--ink);padding:24px;display:flex;justify-content:center;}
  .card{width:420px;background:var(--card);border:1px solid var(--hairline);border-radius:var(--r-xl);box-shadow:var(--shadow-card);padding:26px 28px;}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .lvl{font-weight:800;font-size:12px;padding:4px 10px;border-radius:var(--r-pill);background:var(--cefr-a1-tint);color:var(--cefr-a1);}
  .fav{color:var(--ink-3);font-size:20px;}
  .word{font-family:var(--font-serif);font-size:46px;font-weight:500;letter-spacing:-.02em;line-height:1;}
  .ipa{font-family:var(--font-mono);font-size:14px;color:var(--ink-3);margin-top:7px;}
  .rule{height:1px;background:var(--hairline);margin:18px 0;}
  .tr{font-size:20px;font-weight:600;color:var(--pine);}
  .ex{font-family:var(--font-serif);font-style:italic;font-size:17px;color:var(--ink-2);margin-top:8px;line-height:1.4;}
</style></head><body>
  <div class="card">
    <div class="top">
      <span class="lvl">A1 · noun</span>
      <ion-icon class="fav" name="heart-outline"></ion-icon>
    </div>
    <div class="word">die&nbsp;Stunde</div>
    <div class="ipa">/ˈʃtʊndə/</div>
    <div class="rule"></div>
    <div class="tr">the hour</div>
    <div class="ex">„Wir treffen uns in einer Stunde.“</div>
  </div>
</body></html>
