<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html data-theme="dark"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);font-family:var(--font-sans);color:var(--ink);padding:22px 24px;}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:12px;}
  .row{display:flex;gap:10px;}
  .sw{flex:1;display:flex;flex-direction:column;gap:7px;}
  .chip{height:50px;border-radius:var(--r-md);box-shadow:var(--shadow-sm);}
  .bd{border:1px solid var(--hairline);}
  .n{font-size:11.5px;font-weight:700;}
  .h{font-size:10px;font-family:var(--font-mono);color:var(--ink-3);}
</style></head><body>
  <div class="lbl">Evening mode — warm espresso, brand still glows</div>
  <div class="row">
    <div class="sw"><div class="chip bd" style="background:var(--paper)"></div><div class="n">Paper</div><div class="h">#1C1916</div></div>
    <div class="sw"><div class="chip bd" style="background:var(--card)"></div><div class="n">Card</div><div class="h">#2A251E</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="n">Ink</div><div class="h">#F1EADD</div></div>
    <div class="sw"><div class="chip" style="background:var(--pine)"></div><div class="n">Pine</div><div class="h">#2BA391</div></div>
    <div class="sw"><div class="chip" style="background:var(--amber)"></div><div class="n">Amber</div><div class="h">#E89A3C</div></div>
    <div class="sw"><div class="chip" style="background:var(--honey)"></div><div class="n">Honey</div><div class="h">#F2B741</div></div>
  </div>
</body></html>
