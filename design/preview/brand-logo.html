<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);font-family:var(--font-sans);color:var(--ink);padding:24px;display:flex;align-items:center;gap:32px;}
  .mark{display:flex;align-items:baseline;}
  .word{font-family:var(--font-serif);font-size:52px;font-weight:600;letter-spacing:-1.5px;color:var(--ink);position:relative;}
  .spark{position:absolute;top:9px;right:6px;width:11px;height:11px;border-radius:50%;background:var(--amber);}
  .spark::after{content:"";position:absolute;inset:3.4px;border-radius:50%;background:var(--honey);}
  .app{width:88px;height:88px;border-radius:22px;background:var(--pine);display:flex;align-items:center;justify-content:center;position:relative;box-shadow:var(--shadow-md);}
  .app .m{font-family:var(--font-serif);font-size:58px;font-weight:600;color:var(--surface);}
  .app .spark2{position:absolute;top:14px;right:16px;width:15px;height:15px;border-radius:50%;background:var(--amber);}
  .app .spark2::after{content:"";position:absolute;inset:4.5px;border-radius:50%;background:var(--honey);}
</style></head><body>
  <div class="mark"><span class="word">Marank<span style="position:relative">i<span class="spark"></span></span></span></div>
  <div class="app"><span class="m">M</span><span class="spark2"></span></div>
</body></html>
